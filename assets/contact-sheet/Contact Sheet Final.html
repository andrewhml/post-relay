<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Contact Sheet — Final · Post Relay</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="contact-sheet-final.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #0c0b09;
    color: #ece8de;
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
  }

  /* Demo wrapper — not part of the components. Mimics chat width. */
  .demo-page { padding: 56px 20px 80px; }
  .demo-container {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 44px;
  }
  .demo-step { display: flex; flex-direction: column; gap: 12px; }
  .demo-step-label {
    display: flex;
    align-items: baseline;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.42);
    text-transform: uppercase;
    padding: 0 4px;
  }
  .demo-step-num {
    color: #e8a838;
    font-weight: 600;
  }
  .demo-frame {
    border-radius: 6px;
    overflow: hidden;
    box-shadow:
      0 1px 0 rgba(255, 255, 255, 0.05) inset,
      0 24px 60px -24px rgba(0, 0, 0, 0.6);
  }

  .demo-footer {
    max-width: 720px;
    margin: 56px auto 0;
    padding: 24px 4px 0;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: rgba(255, 255, 255, 0.42);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }
  .demo-footer code {
    color: rgba(255, 255, 255, 0.7);
    font: inherit;
  }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#14120f">
  <svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#e8a838" stroke-width="2">
      <rect x="40" y="40" width="50" height="50" />
      <rect x="100" y="40" width="50" height="50" />
      <rect x="160" y="40" width="50" height="50" />
      <rect x="40" y="100" width="50" height="40" />
      <rect x="100" y="100" width="50" height="40" />
      <rect x="160" y="100" width="50" height="40" />
    </g>
    <g fill="#e8a838" font-family="ui-monospace, monospace" font-size="9" font-weight="600">
      <text x="44" y="54">01</text>
      <text x="104" y="54">02</text>
      <text x="164" y="54">03</text>
    </g>
  </svg>
</template>
<div id="root"></div>

<!-- Plain JS (must load before the babel-compiled scripts that depend on them) -->
<script src="crop-helpers.js"></script>
<script src="sample-data.js"></script>

<!-- Babel-compiled React components -->
<script type="text/babel" src="contact-sheet.jsx"></script>
<script type="text/babel" src="carousel-preview.jsx"></script>

<!-- Demo app — wires the components with sample data -->
<script type="text/babel">
  function App() {
    return (
      <div className="demo-page">
        <div className="demo-container">
          <div className="demo-step">
            <div className="demo-step-label">
              <span className="demo-step-num">01</span>
              <span>Select &middot; pick photos from the library</span>
            </div>
            <div className="demo-frame">
              <ContactSheet
                mode="select"
                photos={SAMPLE_PHOTOS}
                title="Granary Coffee · feed candidates"
                sub="shoot 02 · nov 18"
              />
            </div>
          </div>

          <div className="demo-step">
            <div className="demo-step-label">
              <span className="demo-step-num">02</span>
              <span>Crop &middot; adjust each selected photo</span>
            </div>
            <div className="demo-frame">
              <ContactSheet
                mode="crop"
                photos={SAMPLE_CAROUSEL_ORDER.map(n => SAMPLE_PHOTOS.find(p => p.n === n)).filter(Boolean)}
                leadNum={SAMPLE_LEAD}
                title="Granary Coffee · cropping"
                sub="04 selected · lead E"
              />
            </div>
          </div>

          <div className="demo-step">
            <div className="demo-step-label">
              <span className="demo-step-num">03</span>
              <span>Confirm &middot; the post in carousel order</span>
            </div>
            <div className="demo-frame">
              <CarouselPreview
                photos={SAMPLE_PHOTOS}
                order={SAMPLE_CAROUSEL_ORDER}
                ratio={SAMPLE_CAROUSEL_RATIO}
                caption={SAMPLE_CAROUSEL_CAPTION}
              />
            </div>
          </div>
        </div>

        <div className="demo-footer">
          <div>Components: <code>&lt;ContactSheet mode="select"&gt;</code> · <code>&lt;ContactSheet mode="crop"&gt;</code> · <code>&lt;CarouselPreview&gt;</code></div>
          <div>Files: <code>contact-sheet.jsx</code> · <code>carousel-preview.jsx</code> · <code>crop-helpers.js</code> · <code>contact-sheet-final.css</code></div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
