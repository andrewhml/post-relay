# Copy this file to config/photo_sources.yaml and update paths for your machine.
# Local/NAS processed folders are the durable source of truth.
# Post Relay must never delete, move, or mutate source media.

photo_sources:
  # Replace this with a folder of processed/exported photos on your machine or NAS.
  - name: local-processed-photos
    root: /path/to/your/processed/photos
    source_type: processed_folder
    enabled: true
    reliability_score: 1.0

review_artifacts:
  root: data/review_artifacts
  thumbnail_max_px: 1600
  contact_sheet_columns: 3
  # Start local-first; optional upload/delivery layers can be added later.
  mode: local

publish_exports:
  root: data/publish_exports
  default_profile: feed_portrait_3x4

r2_staging:
  # Self-managed R2 staging is optional. Keep disabled until bucket settings and
  # POST_RELAY_R2_* credentials are configured privately in .env.
  enabled: false
  bucket: your-r2-bucket-name
  endpoint_url: https://YOUR_ACCOUNT_ID.r2.cloudflarestorage.com
  public_base_url: https://media.example.com
  prefix: post-relay/staging
  default_ttl_hours: 72
  cleanup_after_publish: true
  account_id_env: POST_RELAY_R2_ACCOUNT_ID
  access_key_id_env: POST_RELAY_R2_ACCESS_KEY_ID
  secret_access_key_env: POST_RELAY_R2_SECRET_ACCESS_KEY

supported_image_extensions:
  - .jpg
  - .jpeg
  - .png
  - .heic
  - .tif
  - .tiff
